name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            rust-target: aarch64-apple-darwin
            artifact-glob: target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          - os: macos-latest
            rust-target: x86_64-apple-darwin
            artifact-glob: target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          - os: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu
            artifact-glob: |
              target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
              target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm
              target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
          - os: ubuntu-latest
            rust-target: aarch64-unknown-linux-gnu
            cross: true
            bundles: deb
            artifact-glob: |
              target/aarch64-unknown-linux-gnu/release/bundle/deb/*.deb
          - os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            artifact-glob: |
              target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
              target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          - os: windows-11-arm
            rust-target: aarch64-pc-windows-msvc
            artifact-glob: |
              target/aarch64-pc-windows-msvc/release/bundle/msi/*.msi
              target/aarch64-pc-windows-msvc/release/bundle/nsis/*.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.rust-target }}

      - name: Install system dependencies (Linux x64)
        if: matrix.rust-target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            rpm

      - name: Install cross-compilation dependencies (Linux arm64)
        if: matrix.cross
        run: |
          sudo dpkg --add-architecture arm64

          # Pin existing sources to amd64 only, then add arm64 from ports
          for f in /etc/apt/sources.list.d/*.sources; do
            [ -f "$f" ] && sudo sed -i '/^Architectures:/d; /^Types:/a Architectures: amd64' "$f"
          done
          for f in /etc/apt/sources.list.d/*.list; do
            [ -f "$f" ] && sudo sed -i 's|^deb \[|deb [arch=amd64,|; s|^deb http|deb [arch=amd64] http|' "$f"
          done

          CODENAME=$(lsb_release -cs)
          cat <<SOURCES | sudo tee /etc/apt/sources.list.d/arm64-ports.list
          deb [arch=arm64] http://ports.ubuntu.com/ ${CODENAME} main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ ${CODENAME}-updates main restricted universe multiverse
          SOURCES

          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            patchelf
          sudo apt-get install -y --fix-broken \
            libtiff6:arm64 \
            libgtk-3-dev:arm64 \
            libwebkit2gtk-4.1-dev:arm64 \
            libappindicator3-dev:arm64 \
            librsvg2-dev:arm64 \
            libssl-dev:arm64

      - name: Configure cross-compilation environment (Linux arm64)
        if: matrix.cross
        run: |
          echo "PKG_CONFIG_SYSROOT_DIR=/usr/aarch64-linux-gnu" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        run: npx tauri build --target ${{ matrix.rust-target }} ${{ matrix.bundles && format('--bundles {0}', matrix.bundles) || '' }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact-glob }}
          draft: true
          generate_release_notes: true
